<!DOCTYPE html>
<html>
<head>
    <title>Sarcoma Cancer Prediction</title>
</head>
    
<body>

<h1>Sarcoma Cancer Prediction System</h1>

<form action="/predict" method="POST">

    <input type="number" name="age" placeholder="Age" required>
    <br><br>

    <input type="number" step="0.1" name="tumor_size"
           placeholder="Tumor Size" required>
    <br><br>

    <button type="submit">Predict</button>

</form>

</body>
</html>
