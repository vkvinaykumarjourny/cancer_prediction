<!DOCTYPE html>
<html>
<head>
    <title>Image Prediction Result</title>

    <style>

        body{
            background:#0b1020;
            color:white;
            font-family:Arial, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            margin:0;
        }

        .container{
            width:700px;
            background:#1f2937;
            padding:40px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 0 20px rgba(0,0,0,0.5);
        }

        h1{
            margin-bottom:25px;
        }

        .result{
            font-size:40px;
            font-weight:bold;
            color:#ff4d4d;
            margin:20px 0;
        }

        .confidence{
            font-size:24px;
            margin-bottom:25px;
        }

        img{
            width:350px;
            border-radius:10px;
            margin-bottom:20px;
        }

        .btn{
            display:inline-block;
            background:#8b5cf6;
            color:white;
            padding:12px 25px;
            border-radius:10px;
            text-decoration:none;
            font-size:18px;
        }

    </style>
</head>
<body>

<div class="container">

    <h1>Image Prediction Result</h1>

    {% if filename %}
        <img src="{{ url_for('uploaded_file', filename=filename) }}">
    {% endif %}

    <div class="result">
        {{ result }}
    </div>

    <div class="confidence">
        Confidence: {{ confidence }}%
    </div>

    <a href="/" class="btn">
        Back Dashboard
    </a>

</div>

</body>
</html>
