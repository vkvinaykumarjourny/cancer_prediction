<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body{
            background:#0b1020;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:white;
        }

        .login-box{
            background:#1f2937;
            padding:40px;
            border-radius:15px;
            width:350px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            background:#8b5cf6;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="login-box">

    <h2>Hospital Login</h2>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
